<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tables Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1c1c28;
    --accent: #f5c842;
    --accent2: #ff6b35;
    --green: #3ddc84;
    --red: #ff4d6d;
    --text: #f0f0f5;
    --muted: #6b6b80;
    --border: #2a2a3a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
  }

  .app {
    width: 100%;
    max-width: 480px;
    padding: 20px;
    position: relative;
    z-index: 1;
  }

  /* ── SCREENS ── */
  .screen { display: none; animation: fadeIn 0.4s ease; }
  .screen.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  /* ── HOME ── */
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    line-height: 1;
    letter-spacing: 2px;
    color: var(--accent);
    text-shadow: 0 0 40px rgba(245,200,66,0.3);
    margin-bottom: 4px;
  }
  .tagline {
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  .setting-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .range-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    align-items: center;
  }
  .range-select {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 16px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    outline: none;
    appearance: none;
    text-align: center;
  }
  .range-select:focus { border-color: var(--accent); }
  .range-arrow { color: var(--muted); font-size: 18px; }

  .mode-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 30px;
  }
  .mode-btn {
    background: var(--card);
    border: 1.5px solid var(--border);
    color: var(--muted);
    padding: 14px;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.2s;
    text-align: center;
  }
  .mode-btn.selected {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(245,200,66,0.08);
  }

  .start-btn {
    width: 100%;
    padding: 18px;
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    border-radius: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(245,200,66,0.3); }
  .start-btn:active { transform: translateY(0); }

  /* ── QUIZ ── */
  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
  }
  .progress-wrap {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    margin-right: 16px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.5s ease;
  }
  .q-counter {
    font-size: 13px;
    color: var(--muted);
    font-weight: 700;
    white-space: nowrap;
  }
  .score-badge {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 99px;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    margin-left: 10px;
  }

  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 30px;
    text-align: center;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .question-card::before {
    content: '×';
    position: absolute;
    right: 20px;
    top: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 80px;
    color: var(--border);
    line-height: 1;
  }
  .question-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px;
    letter-spacing: 3px;
    color: var(--text);
    line-height: 1;
  }
  .question-text span { color: var(--accent); }

  /* MCQ options */
  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }
  .option-btn {
    background: var(--card);
    border: 1.5px solid var(--border);
    color: var(--text);
    padding: 20px 10px;
    border-radius: 12px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
    transform: scale(1.03);
  }
  .option-btn.correct { background: rgba(61,220,132,0.15); border-color: var(--green); color: var(--green); }
  .option-btn.wrong { background: rgba(255,77,109,0.15); border-color: var(--red); color: var(--red); }
  .option-btn:disabled { cursor: default; }

  /* Type answer */
  .type-input {
    width: 100%;
    background: var(--card);
    border: 1.5px solid var(--border);
    color: var(--text);
    padding: 20px;
    border-radius: 12px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 2px;
    text-align: center;
    outline: none;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  .type-input:focus { border-color: var(--accent); }
  .type-input.correct { border-color: var(--green); color: var(--green); }
  .type-input.wrong { border-color: var(--red); color: var(--red); }

  .submit-btn {
    width: 100%;
    padding: 16px;
    background: var(--surface);
    border: 1.5px solid var(--accent);
    color: var(--accent);
    border-radius: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 12px;
  }
  .submit-btn:hover { background: var(--accent); color: #0a0a0f; }

  .feedback-msg {
    text-align: center;
    font-size: 14px;
    font-weight: 700;
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 10px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .feedback-msg.show { opacity: 1; }
  .feedback-msg.correct { background: rgba(61,220,132,0.12); color: var(--green); }
  .feedback-msg.wrong { background: rgba(255,77,109,0.12); color: var(--red); }

  /* Timer bar */
  .timer-bar-wrap {
    height: 3px;
    background: var(--border);
    border-radius: 99px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .timer-bar {
    height: 100%;
    background: var(--accent2);
    border-radius: 99px;
    transition: width 1s linear, background 0.5s;
    width: 100%;
  }

  /* ── RESULTS ── */
  .results-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 30px;
    text-align: center;
    margin-bottom: 20px;
  }
  .result-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .big-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 96px;
    line-height: 1;
    color: var(--accent);
    text-shadow: 0 0 40px rgba(245,200,66,0.3);
    margin-bottom: 4px;
  }
  .big-score span { font-size: 40px; color: var(--muted); }
  .result-msg {
    font-size: 15px;
    color: var(--muted);
    margin-bottom: 30px;
  }
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }
  .stat-box {
    background: var(--surface);
    border-radius: 10px;
    padding: 14px 8px;
  }
  .stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 1px;
  }
  .stat-key { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
  .stat-val.green { color: var(--green); }
  .stat-val.red { color: var(--red); }
  .stat-val.yellow { color: var(--accent); }

  .action-row { display: flex; gap: 10px; }
  .retry-btn, .home-btn {
    flex: 1;
    padding: 16px;
    border-radius: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
  }
  .retry-btn { background: var(--accent); color: #0a0a0f; }
  .retry-btn:hover { box-shadow: 0 6px 20px rgba(245,200,66,0.3); transform: translateY(-1px); }
  .home-btn { background: var(--surface); border: 1.5px solid var(--border); color: var(--muted); }
  .home-btn:hover { border-color: var(--text); color: var(--text); }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 8px;
    height: 8px;
    pointer-events: none;
    z-index: 999;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- HOME -->
  <div class="screen active" id="home-screen">
    <div class="logo">TABLES<br>QUIZ</div>
    <div class="tagline">Multiplication Master</div>

    <div class="setting-label">Table Range</div>
    <div class="range-row">
      <select class="range-select" id="range-from">
        <script>for(let i=2;i<=30;i++) document.write(`<option value="${i}"${i==2?' selected':''}>${i}</option>`)</script>
      </select>
      <span class="range-arrow">→</span>
      <select class="range-select" id="range-to">
        <script>for(let i=2;i<=30;i++) document.write(`<option value="${i}"${i==12?' selected':''}>${i}</option>`)</script>
      </select>
    </div>

    <div class="setting-label">Questions</div>
    <div class="mode-grid" id="q-count-grid">
      <button class="mode-btn selected" data-val="10">10 Qs</button>
      <button class="mode-btn" data-val="20">20 Qs</button>
      <button class="mode-btn" data-val="30">30 Qs</button>
      <button class="mode-btn" data-val="50">50 Qs</button>
    </div>

    <div class="setting-label">Mode</div>
    <div class="mode-grid" id="mode-grid">
      <button class="mode-btn selected" data-val="mcq">MCQ</button>
      <button class="mode-btn" data-val="type">Type Answer</button>
    </div>

    <button class="start-btn" onclick="startQuiz()">START QUIZ</button>
  </div>

  <!-- QUIZ -->
  <div class="screen" id="quiz-screen">
    <div class="quiz-header">
      <div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
      <div class="q-counter" id="q-counter">1/10</div>
      <div class="score-badge" id="score-badge">0</div>
    </div>
    <div class="timer-bar-wrap"><div class="timer-bar" id="timer-bar"></div></div>
    <div class="question-card">
      <div class="question-text" id="question-text"></div>
    </div>
    <div id="answer-area"></div>
    <div class="feedback-msg" id="feedback-msg"></div>
  </div>

  <!-- RESULTS -->
  <div class="screen" id="results-screen">
    <div class="results-card">
      <div class="result-label">Final Score</div>
      <div class="big-score" id="final-score">0<span>/10</span></div>
      <div class="result-msg" id="result-msg"></div>
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-val green" id="stat-correct">0</div>
          <div class="stat-key">Correct</div>
        </div>
        <div class="stat-box">
          <div class="stat-val red" id="stat-wrong">0</div>
          <div class="stat-key">Wrong</div>
        </div>
        <div class="stat-box">
          <div class="stat-val yellow" id="stat-pct">0%</div>
          <div class="stat-key">Accuracy</div>
        </div>
      </div>
    </div>
    <div class="action-row">
      <button class="retry-btn" onclick="startQuiz()">RETRY</button>
      <button class="home-btn" onclick="showScreen('home-screen')">HOME</button>
    </div>
  </div>

</div>

<script>
// ── Settings toggles ──
document.querySelectorAll('#q-count-grid .mode-btn').forEach(b => {
  b.onclick = () => { document.querySelectorAll('#q-count-grid .mode-btn').forEach(x => x.classList.remove('selected')); b.classList.add('selected'); }
});
document.querySelectorAll('#mode-grid .mode-btn').forEach(b => {
  b.onclick = () => { document.querySelectorAll('#mode-grid .mode-btn').forEach(x => x.classList.remove('selected')); b.classList.add('selected'); }
});

// ── State ──
let questions = [], current = 0, score = 0, timerInterval = null;
const TIMER_SECS = 15;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function getSetting(gridId) {
  return document.querySelector(`#${gridId} .mode-btn.selected`)?.dataset.val;
}

function generateQuestions(from, to, count) {
  const qs = [];
  for (let i = 0; i < count * 3; i++) {
    const a = Math.floor(Math.random() * (to - from + 1)) + from;
    const b = Math.floor(Math.random() * 10) + 1;
    qs.push({ a, b, ans: a * b });
  }
  // Shuffle and slice
  return qs.sort(() => Math.random() - 0.5).slice(0, count);
}

function startQuiz() {
  const from = parseInt(document.getElementById('range-from').value);
  const to = parseInt(document.getElementById('range-to').value);
  const count = parseInt(getSetting('q-count-grid'));
  questions = generateQuestions(Math.min(from,to), Math.max(from,to), count);
  current = 0; score = 0;
  document.getElementById('score-badge').textContent = '0';
  showScreen('quiz-screen');
  renderQuestion();
}

function renderQuestion() {
  if (current >= questions.length) { showResults(); return; }
  const q = questions[current];
  const total = questions.length;
  const mode = getSetting('mode-grid');

  // Header
  document.getElementById('q-counter').textContent = `${current+1}/${total}`;
  document.getElementById('progress-bar').style.width = `${(current/total)*100}%`;

  // Question
  document.getElementById('question-text').innerHTML = `<span>${q.a}</span> × ${q.b} = ?`;

  // Answer area
  const area = document.getElementById('answer-area');
  document.getElementById('feedback-msg').className = 'feedback-msg';

  if (mode === 'mcq') {
    const opts = generateOptions(q.ans);
    area.innerHTML = `<div class="options-grid">${opts.map(o => `<button class="option-btn" onclick="checkMCQ(${o}, this)">${o}</button>`).join('')}</div>`;
  } else {
    area.innerHTML = `
      <input class="type-input" id="type-input" type="number" inputmode="numeric" placeholder="?" autofocus />
      <button class="submit-btn" onclick="checkType()">SUBMIT</button>`;
    document.getElementById('type-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkType(); });
    setTimeout(() => document.getElementById('type-input')?.focus(), 50);
  }

  // Timer
  startTimer();
}

function generateOptions(correct) {
  const opts = new Set([correct]);
  while (opts.size < 4) {
    const delta = Math.floor(Math.random() * 20) - 10;
    const v = correct + delta;
    if (v > 0 && v !== correct) opts.add(v);
  }
  return [...opts].sort(() => Math.random() - 0.5);
}

function startTimer() {
  clearInterval(timerInterval);
  const bar = document.getElementById('timer-bar');
  bar.style.transition = 'none';
  bar.style.width = '100%';
  bar.style.background = 'var(--accent2)';
  let elapsed = 0;
  setTimeout(() => {
    bar.style.transition = `width ${TIMER_SECS}s linear`;
    bar.style.width = '0%';
  }, 50);
  timerInterval = setInterval(() => {
    elapsed++;
    if (elapsed >= TIMER_SECS) {
      clearInterval(timerInterval);
      timeUp();
    }
    if (elapsed >= TIMER_SECS * 0.6) bar.style.background = 'var(--red)';
  }, 1000);
}

function timeUp() {
  const q = questions[current];
  showFeedback(false, `Time's up! Answer: ${q.ans}`);
  disableAnswers();
  setTimeout(() => { current++; renderQuestion(); }, 1500);
}

function checkMCQ(val, btn) {
  clearInterval(timerInterval);
  const q = questions[current];
  const correct = val === q.ans;
  document.querySelectorAll('.option-btn').forEach(b => {
    b.disabled = true;
    if (parseInt(b.textContent) === q.ans) b.classList.add('correct');
  });
  if (!correct) btn.classList.add('wrong');
  if (correct) score++;
  document.getElementById('score-badge').textContent = score;
  showFeedback(correct, correct ? '✓ Correct!' : `✗ Answer: ${q.ans}`);
  setTimeout(() => { current++; renderQuestion(); }, 900);
}

function checkType() {
  clearInterval(timerInterval);
  const inp = document.getElementById('type-input');
  const val = parseInt(inp.value);
  const q = questions[current];
  const correct = val === q.ans;
  inp.disabled = true;
  document.querySelector('.submit-btn').disabled = true;
  inp.classList.add(correct ? 'correct' : 'wrong');
  if (correct) score++;
  document.getElementById('score-badge').textContent = score;
  showFeedback(correct, correct ? '✓ Correct!' : `✗ Answer: ${q.ans}`);
  setTimeout(() => { current++; renderQuestion(); }, 900);
}

function disableAnswers() {
  document.querySelectorAll('.option-btn, .submit-btn, .type-input').forEach(el => el.disabled = true);
}

function showFeedback(correct, msg) {
  const el = document.getElementById('feedback-msg');
  el.textContent = msg;
  el.className = `feedback-msg ${correct ? 'correct' : 'wrong'} show`;
}

function showResults() {
  const total = questions.length;
  const pct = Math.round((score/total)*100);
  document.getElementById('final-score').innerHTML = `${score}<span>/${total}</span>`;
  document.getElementById('stat-correct').textContent = score;
  document.getElementById('stat-wrong').textContent = total - score;
  document.getElementById('stat-pct').textContent = pct + '%';
  const msgs = [
    [90, "🔥 MASTERMIND! You're a tables legend!"],
    [70, "💪 Great work! Almost perfect!"],
    [50, "👍 Good effort! Keep practicing!"],
    [0,  "📚 Keep going! Practice makes perfect!"]
  ];
  document.getElementById('result-msg').textContent = msgs.find(([t]) => pct >= t)[1];
  showScreen('results-screen');
  if (pct >= 70) fireConfetti();
}

function fireConfetti() {
  const colors = ['#f5c842','#ff6b35','#3ddc84','#ff4d6d','#a78bfa'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.cssText = `
        left:${Math.random()*100}vw;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        border-radius:${Math.random()>0.5?'50%':'2px'};
        animation-duration:${1.5+Math.random()*2}s;
        animation-delay:${Math.random()*0.5}s;
        width:${6+Math.random()*8}px;
        height:${6+Math.random()*8}px;
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, i * 30);
  }
}
</script>
</body>
</html>
